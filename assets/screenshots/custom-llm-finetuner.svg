<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0800"/>
      <stop offset="100%" style="stop-color:#120f00"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lossLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#f59e0b" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)" rx="16"/>
  <rect width="800" height="450" fill="url(#dots)" rx="16"/>

  <circle cx="400" cy="220" r="200" fill="#f59e0b" opacity="0.04" filter="url(#softGlow)"/>
  <rect x="100" y="0" width="600" height="1" fill="url(#glowLine)" opacity="0.7"/>

  <!-- Neural network background visualization -->
  <g opacity="0.08" stroke="#f59e0b" stroke-width="0.6" fill="none">
    <!-- Layer 1 (input) nodes -->
    <circle cx="80" cy="140" r="6" fill="#f59e0b"/>
    <circle cx="80" cy="200" r="6" fill="#f59e0b"/>
    <circle cx="80" cy="260" r="6" fill="#f59e0b"/>
    <circle cx="80" cy="320" r="6" fill="#f59e0b"/>
    <!-- Layer 2 nodes -->
    <circle cx="200" cy="160" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="220" r="6" fill="#f59e0b"/>
    <circle cx="200" cy="280" r="6" fill="#f59e0b"/>
    <!-- Connections 1→2 -->
    <line x1="86" y1="140" x2="194" y2="160"/>
    <line x1="86" y1="140" x2="194" y2="220"/>
    <line x1="86" y1="200" x2="194" y2="160"/>
    <line x1="86" y1="200" x2="194" y2="220"/>
    <line x1="86" y1="200" x2="194" y2="280"/>
    <line x1="86" y1="260" x2="194" y2="220"/>
    <line x1="86" y1="260" x2="194" y2="280"/>
    <line x1="86" y1="320" x2="194" y2="280"/>
    <!-- Right side mirror -->
    <circle cx="720" cy="140" r="6" fill="#f59e0b"/>
    <circle cx="720" cy="200" r="6" fill="#f59e0b"/>
    <circle cx="720" cy="260" r="6" fill="#f59e0b"/>
    <circle cx="720" cy="320" r="6" fill="#f59e0b"/>
    <circle cx="600" cy="160" r="6" fill="#f59e0b"/>
    <circle cx="600" cy="220" r="6" fill="#f59e0b"/>
    <circle cx="600" cy="280" r="6" fill="#f59e0b"/>
    <line x1="606" y1="160" x2="714" y2="140"/>
    <line x1="606" y1="160" x2="714" y2="200"/>
    <line x1="606" y1="220" x2="714" y2="200"/>
    <line x1="606" y1="220" x2="714" y2="260"/>
    <line x1="606" y1="280" x2="714" y2="260"/>
    <line x1="606" y1="280" x2="714" y2="320"/>
  </g>

  <!-- Main training card -->
  <g transform="translate(220, 70)">
    <rect width="360" height="310" rx="12" fill="#150f00" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Header -->
    <rect width="360" height="34" rx="12" fill="#f59e0b" fill-opacity="0.1"/>
    <rect width="360" height="17" y="17" fill="#f59e0b" fill-opacity="0.05"/>
    <text x="180" y="21" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#fbbf24" letter-spacing="1">FINE-TUNING  PIPELINE</text>

    <!-- Pipeline steps -->
    <g transform="translate(16, 46)">
      <!-- Step indicators -->
      <g font-family="monospace" font-size="9">
        <!-- Step 1 -->
        <circle cx="12" cy="12" r="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
        <text x="12" y="16" text-anchor="middle" fill="#fbbf24" font-weight="700">1</text>
        <text x="30" y="16" fill="#e2e8f0" opacity="0.8">Data Prep</text>
        <text x="320" y="16" text-anchor="end" font-size="8" fill="#22c55e" opacity="0.8">✓  4,820 samples</text>
        <line x1="12" y1="22" x2="12" y2="42" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3"/>

        <!-- Step 2 -->
        <circle cx="12" cy="52" r="10" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
        <text x="12" y="56" text-anchor="middle" fill="#fbbf24" font-weight="700">2</text>
        <text x="30" y="56" fill="#e2e8f0" opacity="0.8">LoRA Config</text>
        <text x="320" y="56" text-anchor="end" font-size="8" fill="#22c55e" opacity="0.8">✓  r=16, α=32</text>
        <line x1="12" y1="62" x2="12" y2="82" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3"/>

        <!-- Step 3 active -->
        <circle cx="12" cy="92" r="10" fill="#f59e0b" fill-opacity="0.35" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.9" filter="url(#glow)"/>
        <text x="12" y="96" text-anchor="middle" fill="#fbbf24" font-weight="700">3</text>
        <text x="30" y="96" fill="#fbbf24" opacity="0.95" font-weight="600">Training</text>
        <text x="320" y="96" text-anchor="end" font-size="8" fill="#f59e0b" opacity="0.9">epoch 3/5  ●</text>
        <line x1="12" y1="102" x2="12" y2="122" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 3"/>

        <!-- Step 4 pending -->
        <circle cx="12" cy="132" r="10" fill="#f59e0b" fill-opacity="0.07" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3"/>
        <text x="12" y="136" text-anchor="middle" fill="#fbbf24" opacity="0.4" font-weight="700">4</text>
        <text x="30" y="136" fill="#e2e8f0" opacity="0.4">Evaluation</text>
        <text x="320" y="136" text-anchor="end" font-size="8" fill="#475569" opacity="0.6">pending</text>
        <line x1="12" y1="142" x2="12" y2="162" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="3 3"/>

        <!-- Step 5 pending -->
        <circle cx="12" cy="172" r="10" fill="#f59e0b" fill-opacity="0.07" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3"/>
        <text x="12" y="176" text-anchor="middle" fill="#fbbf24" opacity="0.4" font-weight="700">5</text>
        <text x="30" y="176" fill="#e2e8f0" opacity="0.4">HuggingFace Deploy</text>
        <text x="320" y="176" text-anchor="end" font-size="8" fill="#475569" opacity="0.6">pending</text>
      </g>

      <!-- Loss curve -->
      <g transform="translate(0, 196)">
        <text x="0" y="0" font-family="monospace" font-size="8" fill="#f59e0b" opacity="0.6" letter-spacing="0.5">TRAINING LOSS</text>
        <rect x="0" y="8" width="328" height="60" rx="6" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.2"/>
        <!-- Grid lines -->
        <line x1="0" y1="28" x2="328" y2="28" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.15"/>
        <line x1="0" y1="48" x2="328" y2="48" stroke="#f59e0b" stroke-width="0.3" stroke-opacity="0.15"/>
        <!-- Loss curve (decreasing) -->
        <polyline points="8,62 40,56 72,48 104,38 136,30 168,24 200,20 232,17 264,15 296,14 320,13" fill="none" stroke="url(#lossLine)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
        <!-- Area under -->
        <polygon points="8,68 8,62 40,56 72,48 104,38 136,30 168,24 200,20 232,17 264,15 296,14 320,13 320,68" fill="#f59e0b" fill-opacity="0.06"/>
        <!-- Epoch markers -->
        <line x1="65" y1="8" x2="65" y2="68" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
        <line x1="130" y1="8" x2="130" y2="68" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
        <line x1="196" y1="8" x2="196" y2="68" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 3"/>
        <text x="32" y="75" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.4">ep1</text>
        <text x="97" y="75" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.4">ep2</text>
        <text x="163" y="75" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.7">ep3 ●</text>
        <text x="228" y="75" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.3">ep4</text>
        <text x="308" y="75" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b" opacity="0.3">ep5</text>
        <!-- Current loss label -->
        <text x="316" y="12" text-anchor="end" font-family="monospace" font-size="8" fill="#fbbf24" opacity="0.9" filter="url(#glow)">0.042</text>
      </g>
    </g>
  </g>

  <!-- IN THE WORKS badge -->
  <g transform="translate(270, 22)">
    <rect width="260" height="38" rx="19" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
    <circle cx="24" cy="19" r="5" fill="#f59e0b" opacity="0.9" filter="url(#glow)"/>
    <circle cx="24" cy="19" r="9" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <text x="140" y="23" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#fbbf24" letter-spacing="2" opacity="0.95">IN THE WORKS</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="394" width="800" height="56" fill="#f59e0b" fill-opacity="0.03"/>
  <rect x="0" y="394" width="800" height="1" fill="url(#glowLine)" opacity="0.3"/>
  <text x="36" y="424" font-family="monospace" font-size="10" fill="#f59e0b" opacity="0.4" letter-spacing="1">LORA · FINE-TUNING · PYTORCH · HUGGINGFACE · MLOPS</text>
  <g transform="translate(480, 408)">
    <rect width="56" height="22" rx="11" fill="#150f00"/>
    <text x="28" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">PyTorch</text>
    <rect x="64" y="0" width="52" height="22" rx="11" fill="#150f00"/>
    <text x="90" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">LoRA</text>
    <rect x="124" y="0" width="46" height="22" rx="11" fill="#150f00"/>
    <text x="147" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">MLOps</text>
    <rect x="178" y="0" width="84" height="22" rx="11" fill="#150f00"/>
    <text x="220" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">HuggingFace</text>
    <rect x="270" y="0" width="52" height="22" rx="11" fill="#150f00"/>
    <text x="296" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">PEFT</text>
  </g>
</svg>
